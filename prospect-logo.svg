<svg width="320" height="72" viewBox="0 0 320 72" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- ── Mark: The Threshold ── -->
  <!-- Nested squares with entry gaps — labyrinth corridor depth -->
  <rect x="8"  y="8"  width="56" height="56" stroke="#c8a96e" stroke-width="1.5" fill="none" opacity="1"/>
  <rect x="16" y="16" width="40" height="40" stroke="#c8a96e" stroke-width="1.2" fill="none" opacity="0.6"/>
  <rect x="24" y="24" width="24" height="24" stroke="#c8a96e" stroke-width="1"   fill="none" opacity="0.35"/>
  <rect x="31" y="31" width="10" height="10" stroke="#c8a96e" stroke-width="0.8" fill="none" opacity="0.18"/>
  <!-- Entry gaps cut at top — the labyrinth opening -->
  <line x1="31" y1="8"  x2="41" y2="8"  stroke="#0a0a0c" stroke-width="3"/>
  <line x1="31" y1="16" x2="41" y2="16" stroke="#0a0a0c" stroke-width="3"/>
  <line x1="32" y1="24" x2="40" y2="24" stroke="#0a0a0c" stroke-width="3"/>

  <!-- ── Wordmark ── -->
  <text
    x="84" y="46"
    font-family="Cormorant Garamond, Georgia, serif"
    font-size="28"
    font-weight="300"
    letter-spacing="7"
    fill="#e8e8ec"
  >PROSPECT</text>

</svg>
